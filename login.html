<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M5 EDITZ – Login</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --gold:#F5B800;--gold2:#FFD700;--amber:#E8A000;
  --dark:#05050D;--dark2:#0C0C18;--dark3:#121220;
  --card:#11111F;--card2:#16162A;
  --text:#E8E8F5;--muted:#5A5A80;--muted2:#7A7AAA;
  --red:#E03030;--green:#20C060;--blue:#4080F0;--blue2:#6090FF;
  --glow-g:0 0 40px rgba(245,184,0,.35);
  --glow-b:0 0 40px rgba(64,128,240,.3);
}
html,body{
  width:100%;min-height:100vh;
  overflow-x:hidden;overflow-y:auto;
  background:var(--dark);color:var(--text);
  font-family:'Rajdhani',sans-serif;
}

/* ── 3D CANVAS ── */
#c3d{position:fixed;inset:0;z-index:0;}
.scanline{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.015) 3px,rgba(0,0,0,.015) 6px);}
.vignette{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(ellipse 80% 80% at 50% 50%,transparent 40%,rgba(0,0,0,.75) 100%);}

/* ── CORNER BRACKETS ── */
.corner{position:fixed;width:60px;height:60px;z-index:5;opacity:.4;}
.corner.tl{top:18px;left:18px;border-top:1px solid var(--gold);border-left:1px solid var(--gold);}
.corner.tr{top:18px;right:18px;border-top:1px solid var(--gold);border-right:1px solid var(--gold);}
.corner.bl{bottom:18px;left:18px;border-bottom:1px solid var(--gold);border-left:1px solid var(--gold);}
.corner.br{bottom:18px;right:18px;border-bottom:1px solid var(--gold);border-right:1px solid var(--gold);}
.corner-dot{position:fixed;width:4px;height:4px;border-radius:50%;background:var(--gold);opacity:.5;z-index:5;}
.corner-dot.tl{top:17px;left:17px;}
.corner-dot.tr{top:17px;right:17px;}
.corner-dot.bl{bottom:17px;left:17px;}
.corner-dot.br{bottom:17px;right:17px;}

/* ── TOP BRAND TAG ── */
.brand-tag{
  position:fixed;top:22px;left:50%;transform:translateX(-50%);
  z-index:10;display:flex;align-items:center;gap:14px;
  font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:8px;color:var(--muted);
  white-space:nowrap;
}
.brand-tag::before,.brand-tag::after{content:'';width:40px;height:1px;}
.brand-tag::before{background:linear-gradient(90deg,transparent,var(--muted));}
.brand-tag::after{background:linear-gradient(90deg,var(--muted),transparent);}

/* ── MAIN WRAP ── */
.wrap{
  position:relative;z-index:10;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:80px 16px 50px;
}
.login-box{width:430px;max-width:96vw;}

/* ── LOGO AREA ── */
.logo-area{text-align:center;margin-bottom:30px;}
.logo-ring{
  display:inline-flex;align-items:center;justify-content:center;
  width:76px;height:76px;border-radius:50%;
  border:1.5px solid rgba(245,184,0,.35);
  position:relative;margin-bottom:14px;
}
.logo-ring::before{
  content:'';position:absolute;inset:-7px;border-radius:50%;
  border:1px dashed rgba(245,184,0,.14);
  animation:ringspin 22s linear infinite;
}
.logo-ring::after{
  content:'';position:absolute;inset:7px;border-radius:50%;
  border:1px solid rgba(245,184,0,.07);
}
@keyframes ringspin{to{transform:rotate(360deg);}}
.logo-m5{
  font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;
  background:linear-gradient(135deg,var(--gold),var(--gold2),#FFA500);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 14px rgba(245,184,0,.45));
}
.logo-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:7px;color:#fff;}
.logo-sub{font-size:10px;letter-spacing:5px;color:var(--muted);text-transform:uppercase;margin-top:3px;}

/* ── TABS ── */
.tabs{display:flex;position:relative;background:var(--dark2);border:1px solid rgba(255,255,255,.05);}
.tab-btn{
  flex:1;padding:13px;
  font-family:'Rajdhani',sans-serif;font-weight:700;
  font-size:11px;letter-spacing:4px;text-transform:uppercase;
  border:none;cursor:pointer;background:transparent;
  color:var(--muted);transition:color .3s;position:relative;z-index:2;
}
.tab-btn.active-cust{color:var(--blue2);}
.tab-btn.active-adm{color:var(--gold);}
.tab-indicator{
  position:absolute;bottom:0;left:0;width:50%;height:2px;
  background:var(--blue);
  transition:all .4s cubic-bezier(.4,0,.2,1);
}
.tab-indicator.adm{left:50%;background:var(--gold);}

/* ── PANELS ── */
.panels{overflow:hidden;}
.panel{display:none;}
.panel.visible{display:block;animation:panelIn .35s ease;}
@keyframes panelIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

/* ── GLASS CARD ── */
.glass-card{
  background:var(--card);
  border:1px solid rgba(255,255,255,.065);
  padding:38px 38px 34px;
  position:relative;overflow:hidden;
}
.glass-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.cust .glass-card::before{background:linear-gradient(90deg,transparent,var(--blue),transparent);}
.adm  .glass-card::before{background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.glass-card::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:100px;
  background:linear-gradient(0deg,rgba(245,184,0,.018),transparent);
  pointer-events:none;
}

/* ── PANEL HEADER ── */
.panel-head{text-align:center;margin-bottom:30px;}
.ph-icon{
  display:inline-flex;align-items:center;justify-content:center;
  width:54px;height:54px;border-radius:50%;margin-bottom:12px;font-size:24px;
}
.cust .ph-icon{background:rgba(64,128,240,.1);border:1px solid rgba(64,128,240,.25);}
.adm  .ph-icon{background:rgba(245,184,0,.08);border:1px solid rgba(245,184,0,.2);}
.ph-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;color:#fff;}
.cust .ph-title em{color:var(--blue2);font-style:normal;}
.adm  .ph-title em{color:var(--gold);font-style:normal;}
.ph-sub{font-size:11px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-top:4px;}

/* ── FORM FIELDS ── */
.field{margin-bottom:17px;}
.field label{
  display:block;font-size:10px;letter-spacing:4px;
  text-transform:uppercase;color:var(--muted);margin-bottom:8px;
}
.field input{
  width:100%;background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.07);
  color:var(--text);padding:13px 16px;
  font-family:'Rajdhani',sans-serif;font-size:14px;letter-spacing:.5px;
  outline:none;transition:all .3s;-webkit-appearance:none;
}
.cust .field input:focus{
  border-color:rgba(64,128,240,.5);
  background:rgba(64,128,240,.04);
  box-shadow:0 0 0 3px rgba(64,128,240,.08);
}
.adm .field input:focus{
  border-color:rgba(245,184,0,.45);
  background:rgba(245,184,0,.03);
  box-shadow:0 0 0 3px rgba(245,184,0,.07);
}
.field input::placeholder{color:rgba(255,255,255,.18);font-size:13px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* ── PASSWORD STRENGTH ── */
.strength-bar{display:flex;gap:4px;margin-top:7px;}
.sb{flex:1;height:2px;background:rgba(255,255,255,.07);border-radius:2px;transition:background .3s;}
.sb.w{background:#E04040;}
.sb.m{background:#E8A000;}
.sb.s{background:#20C060;}

/* ── SUBMIT BUTTON ── */
.submit-btn{
  width:100%;margin-top:4px;padding:15px;
  font-family:'Rajdhani',sans-serif;font-weight:700;
  font-size:12px;letter-spacing:5px;text-transform:uppercase;
  border:none;cursor:pointer;transition:all .35s;
  position:relative;overflow:hidden;
  clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);
}
.cust .submit-btn{background:var(--blue);color:#fff;}
.cust .submit-btn:hover:not(:disabled){background:#2060D0;transform:translateY(-1px);box-shadow:var(--glow-b);}
.adm  .submit-btn{background:var(--gold);color:#08080F;}
.adm  .submit-btn:hover:not(:disabled){background:var(--gold2);transform:translateY(-1px);box-shadow:var(--glow-g);}
.submit-btn::after{
  content:'';position:absolute;inset:0;
  background:rgba(255,255,255,.18);
  clip-path:polygon(0 0,0 0,0 100%,0 100%);
  transition:clip-path .4s ease;
}
.submit-btn:hover:not(:disabled)::after{clip-path:polygon(0 0,100% 0,100% 100%,0 100%);}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none !important;}

/* ── MESSAGE BOXES ── */
.msg{
  font-size:11px;letter-spacing:2px;
  padding:9px 12px;margin-top:10px;
  display:none;text-align:center;
}
.msg.err    {color:#FF6060;border:1px solid rgba(230,48,48,.2);background:rgba(230,48,48,.06);}
.msg.ok     {color:#40D080;border:1px solid rgba(32,192,96,.2);background:rgba(32,192,96,.05);}
.msg.loading{color:var(--muted2);border:1px solid rgba(255,255,255,.06);}

/* ── DIVIDER ── */
.divider{display:flex;align-items:center;gap:10px;margin:20px 0 16px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.07);}
.divider span{font-size:10px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;white-space:nowrap;}

/* ── LINKS ── */
.reg-link{text-align:center;font-size:12px;color:var(--muted);}
.reg-link button{
  background:none;border:none;cursor:pointer;
  font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;letter-spacing:1px;
  padding:0;text-decoration:underline;text-underline-offset:2px;
}
.cust .reg-link button{color:var(--blue2);}
.adm  .reg-link button{color:var(--gold);}
.reg-link button:hover{opacity:.8;}

/* ── REGISTER SECTION ── */
.reg-section{display:none;margin-top:18px;padding-top:18px;border-top:1px solid rgba(255,255,255,.06);}
.reg-section.open{display:block;animation:panelIn .3s ease;}
.reg-heading{
  font-family:'Bebas Neue',sans-serif;font-size:15px;
  letter-spacing:4px;color:var(--blue2);
  margin-bottom:16px;text-align:center;
}

/* ── BOTTOM TAG ── */
.bottom-tag{
  position:fixed;bottom:18px;left:0;right:0;
  text-align:center;z-index:10;
  font-size:10px;letter-spacing:5px;
  color:rgba(90,90,128,.55);text-transform:uppercase;
}
.bottom-tag strong{color:rgba(245,184,0,.45);font-weight:700;}

/* ── SECRET ADMIN TRIGGER (top-right corner) ── */
.admin-secret{position:fixed;top:0;right:0;width:48px;height:48px;z-index:999;cursor:pointer;}

/* ── RESPONSIVE ── */
@media(max-width:480px){
  .glass-card{padding:28px 22px 26px;}
  .field-row{grid-template-columns:1fr;}
  .logo-title{font-size:20px;letter-spacing:5px;}
}
</style>
</head>
<body>

<canvas id="c3d"></canvas>
<div class="scanline"></div>
<div class="vignette"></div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>
<div class="corner-dot tl"></div>
<div class="corner-dot tr"></div>
<div class="corner-dot bl"></div>
<div class="corner-dot br"></div>

<!-- Secret admin trigger (hover top-right corner) -->
<div class="admin-secret" onclick="showPanel('adm')" title=""></div>

<div class="brand-tag">PREMIUM STUDIO</div>

<div class="wrap">
<div class="login-box">

  <!-- LOGO -->
  <div class="logo-area">
    <div class="logo-ring"><div class="logo-m5">M5</div></div>
    <div class="logo-title">EDITZ</div>
    <div class="logo-sub">Professional Video Editing</div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active-cust" id="tCust" onclick="showPanel('cust')">&#127916; Customer</button>
    <button class="tab-btn" id="tAdm" onclick="showPanel('adm')">&#9881; Admin</button>
    <div class="tab-indicator" id="tabLine"></div>
  </div>

  <div class="panels">

    <!-- ══════ CUSTOMER PANEL ══════ -->
    <div class="panel cust visible" id="pCust">
      <div class="glass-card">
        <div class="panel-head">
          <div class="ph-icon">&#127916;</div>
          <div class="ph-title">Welcome to <em>M5 Editz</em></div>
          <div class="ph-sub">Sign in to continue</div>
        </div>

        <div class="field">
          <label>Email Address</label>
          <input type="email" id="c-email" placeholder="your@email.com" autocomplete="email">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="c-pass" placeholder="Enter your password"
                 onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <div class="msg" id="cMsg"></div>
        <button class="submit-btn" id="cBtn" onclick="doLogin()">Sign In &#8594; Continue</button>

        <div class="divider"><span>New here?</span></div>
        <div class="reg-link"><button onclick="toggleReg()">Create a free account &#8594;</button></div>

        <!-- REGISTER SECTION (hidden by default) -->
        <div class="reg-section" id="regPanel">
          <div class="reg-heading">— Create New Account —</div>
          <div class="field-row">
            <div class="field"><label>First Name</label><input type="text" id="r-fname" placeholder="First"></div>
            <div class="field"><label>Last Name</label><input type="text" id="r-lname" placeholder="Last"></div>
          </div>
          <div class="field">
            <label>Email Address</label>
            <input type="email" id="r-email" placeholder="your@email.com">
          </div>
          <div class="field">
            <label>Password</label>
            <input type="password" id="r-pass" placeholder="Min 6 characters"
                   oninput="checkStrength(this.value)"
                   onkeydown="if(event.key==='Enter')doRegister()">
            <div class="strength-bar">
              <div class="sb" id="sb1"></div>
              <div class="sb" id="sb2"></div>
              <div class="sb" id="sb3"></div>
              <div class="sb" id="sb4"></div>
            </div>
          </div>
          <div class="msg" id="rMsg"></div>
          <button class="submit-btn" id="rBtn" onclick="doRegister()">Create Account &#8594;</button>
          <div class="reg-link" style="margin-top:14px;">
            <button onclick="toggleReg()">Already have an account? Sign in &#8592;</button>
          </div>
        </div>

      </div>
    </div><!-- /pCust -->

    <!-- ══════ ADMIN PANEL ══════ -->
    <div class="panel adm" id="pAdm">
      <div class="glass-card">
        <div class="panel-head">
          <div class="ph-icon">&#9881;</div>
          <div class="ph-title"><em>Admin</em> Portal</div>
          <div class="ph-sub">Studio Control Center</div>
        </div>

        <div class="field">
          <label>Username</label>
          <input type="text" id="a-user" placeholder="admin" autocomplete="username">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="a-pass" placeholder="Admin password"
                 onkeydown="if(event.key==='Enter')doAdmin()">
        </div>
        <div class="msg" id="aMsg"></div>
        <button class="submit-btn" id="aBtn" onclick="doAdmin()">Access Dashboard &#8594;</button>

        <div class="divider"><span>or</span></div>
        <div class="reg-link">
          <button onclick="showPanel('cust')">&#8592; Back to customer login</button>
        </div>
      </div>
    </div><!-- /pAdm -->

  </div><!-- /panels -->
</div><!-- /login-box -->
</div><!-- /wrap -->

<div class="bottom-tag">M5 EDITZ &middot; <strong>Premium Video Editing</strong> &middot; Est. 2023</div>

<!-- ── Firebase SDKs ── -->
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
/* ═══════════════════════════════════════════
   THREE.JS 3D BACKGROUND
═══════════════════════════════════════════ */
(function(){
  const canvas = document.getElementById('c3d');
  const W = () => window.innerWidth;
  const H = () => window.innerHeight;

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setSize(W(), H());
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));

  const scene  = new THREE.Scene();
  const cam    = new THREE.PerspectiveCamera(70, W() / H(), 0.1, 200);
  cam.position.z = 6;

  /* — Multi-color particle cloud — */
  const N   = 300;
  const pos = new Float32Array(N * 3);
  const col = new Float32Array(N * 3);
  const gold  = [245/255, 184/255, 0];
  const gold2 = [255/255, 215/255, 0];
  const white = [0.78, 0.78, 0.95];

  for (let i = 0; i < N; i++) {
    pos[i*3]   = (Math.random() - .5) * 24;
    pos[i*3+1] = (Math.random() - .5) * 20;
    pos[i*3+2] = (Math.random() - .5) * 14;
    const c = Math.random() < .55 ? gold : Math.random() < .5 ? gold2 : white;
    col[i*3] = c[0]; col[i*3+1] = c[1]; col[i*3+2] = c[2];
  }

  const pGeo = new THREE.BufferGeometry();
  pGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  pGeo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
  const pts = new THREE.Points(pGeo, new THREE.PointsMaterial({
    size: 0.045, vertexColors: true,
    transparent: true, opacity: 0.65, sizeAttenuation: true
  }));
  scene.add(pts);

  /* — Wireframe sphere — */
  const sphere = new THREE.Mesh(
    new THREE.SphereGeometry(2.9, 24, 24),
    new THREE.MeshBasicMaterial({ color: 0xF5B800, wireframe: true, transparent: true, opacity: 0.045 })
  );
  scene.add(sphere);

  /* — Orbital rings — */
  const mkRing = (r, c, op, rx, ry) => {
    const m = new THREE.Mesh(
      new THREE.TorusGeometry(r, 0.012, 8, 100),
      new THREE.MeshBasicMaterial({ color: c, transparent: true, opacity: op })
    );
    if (rx) m.rotation.x = rx;
    if (ry) m.rotation.y = ry;
    scene.add(m); return m;
  };
  const ring1 = mkRing(4.0, 0xFFD700, 0.18, Math.PI / 3.5);
  const ring2 = mkRing(3.0, 0xF5B800, 0.10, -Math.PI / 4, Math.PI / 5);
  const ring3 = mkRing(2.2, 0xE8A000, 0.07,  Math.PI / 2);

  /* — Icosahedron — */
  const ico = new THREE.Mesh(
    new THREE.IcosahedronGeometry(1.7, 1),
    new THREE.MeshBasicMaterial({ color: 0xF5B800, wireframe: true, transparent: true, opacity: 0.05 })
  );
  scene.add(ico);

  /* — Animation loop — */
  let mx = 0, my = 0, f = 0;
  document.addEventListener('mousemove', e => {
    mx = (e.clientX / W() - .5) * 2;
    my = (e.clientY / H() - .5) * 2;
  });

  (function loop() {
    requestAnimationFrame(loop); f++;
    pts.rotation.y = f * .00035; pts.rotation.x = f * .00015;
    sphere.rotation.y = f * .0018; sphere.rotation.x = f * .0009;
    ring1.rotation.z = f * .0022;
    ring2.rotation.z = -f * .0018;
    ring3.rotation.z = f * .003;
    ico.rotation.y   = f * .0013; ico.rotation.x = f * .0008;
    /* Smooth parallax */
    cam.position.x += (mx * .42 - cam.position.x) * .05;
    cam.position.y += (-my * .3  - cam.position.y) * .05;
    cam.lookAt(0, 0, 0);
    renderer.render(scene, cam);
  })();

  window.addEventListener('resize', () => {
    renderer.setSize(W(), H());
    cam.aspect = W() / H();
    cam.updateProjectionMatrix();
  });
})();


/* ═══════════════════════════════════════════
   UI — PANEL SWITCHING
═══════════════════════════════════════════ */
var regOpen = false;

function showPanel(p) {
  ['pCust','pAdm'].forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('visible');
    el.style.display = 'none';
  });
  document.getElementById('tCust').className = 'tab-btn' + (p === 'cust' ? ' active-cust' : '');
  document.getElementById('tAdm').className  = 'tab-btn' + (p === 'adm'  ? ' active-adm'  : '');
  document.getElementById('tabLine').className = 'tab-indicator' + (p === 'adm' ? ' adm' : '');

  const target = document.getElementById(p === 'cust' ? 'pCust' : 'pAdm');
  target.style.display = 'block';
  requestAnimationFrame(() => target.classList.add('visible'));

  if (p === 'cust') {
    regOpen = false;
    document.getElementById('regPanel').className = 'reg-section';
  }
}

function toggleReg() {
  regOpen = !regOpen;
  document.getElementById('regPanel').className = 'reg-section' + (regOpen ? ' open' : '');
  if (regOpen) setTimeout(() => document.getElementById('regPanel').scrollIntoView({ block: 'nearest', behavior: 'smooth' }), 50);
}


/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
function setMsg(id, type, text) {
  const el = document.getElementById(id);
  el.className = 'msg' + (type ? ' ' + type : '');
  el.textContent = text;
  el.style.display = text ? 'block' : 'none';
}

function setBusy(id, busy, label) {
  const el = document.getElementById(id);
  el.disabled = busy;
  el.textContent = busy ? 'Please wait...' : label;
}

function errMsg(code) {
  const map = {
    'auth/user-not-found'      : 'No account found with this email.',
    'auth/wrong-password'      : 'Incorrect password. Try again.',
    'auth/invalid-credential'  : 'Incorrect email or password.',
    'auth/email-already-in-use': 'This email is already registered.',
    'auth/invalid-email'       : 'Please enter a valid email address.',
    'auth/weak-password'       : 'Password must be at least 6 characters.',
    'auth/too-many-requests'   : 'Too many attempts. Try again later.',
    'auth/network-request-failed': 'Network error. Check your connection.'
  };
  return map[code] || 'Something went wrong. Please try again.';
}

function checkStrength(v) {
  const tests = [/./,  /.{6,}/, /[A-Z]/, /[0-9!@#$%^&*]/];
  const score = tests.filter(r => r.test(v)).length;
  ['sb1','sb2','sb3','sb4'].forEach((id, i) => {
    const el = document.getElementById(id);
    el.className = 'sb' + (i < score ? (score <= 2 ? ' w' : score <= 3 ? ' m' : ' s') : '');
  });
}


/* ═══════════════════════════════════════════
   CUSTOMER — SIGN IN
═══════════════════════════════════════════ */
function doLogin() {
  const email = document.getElementById('c-email').value.trim();
  const pass  = document.getElementById('c-pass').value;
  if (!email || !pass) { setMsg('cMsg', 'err', 'Please enter your email and password.'); return; }
  setMsg('cMsg', 'loading', 'Signing in...');
  setBusy('cBtn', true, 'Sign In → Continue');
  try {
    auth.signInWithEmailAndPassword(email, pass)
      .then(() => {
        setMsg('cMsg', 'ok', '✓ Welcome back! Redirecting...');
        setTimeout(() => window.location.href = 'home.html', 800);
      })
      .catch(e => {
        setMsg('cMsg', 'err', errMsg(e.code));
        setBusy('cBtn', false, 'Sign In → Continue');
      });
  } catch(e) {
    setMsg('cMsg', 'err', 'Firebase not configured. Please fill in firebase-config.js');
    setBusy('cBtn', false, 'Sign In → Continue');
  }
}


/* ═══════════════════════════════════════════
   CUSTOMER — REGISTER
═══════════════════════════════════════════ */
function doRegister() {
  const fname = document.getElementById('r-fname').value.trim();
  const lname = document.getElementById('r-lname').value.trim();
  const email = document.getElementById('r-email').value.trim();
  const pass  = document.getElementById('r-pass').value;
  if (!fname || !lname || !email || !pass) { setMsg('rMsg', 'err', 'All fields are required.'); return; }
  if (pass.length < 6) { setMsg('rMsg', 'err', 'Password must be at least 6 characters.'); return; }
  setMsg('rMsg', 'loading', 'Creating your account...');
  setBusy('rBtn', true, 'Create Account →');
  try {
    auth.createUserWithEmailAndPassword(email, pass)
      .then(cred => {
        const fullName = fname + ' ' + lname;
        cred.user.updateProfile({ displayName: fullName });
        try {
          db.collection('users').doc(cred.user.uid).set({
            name: fullName, email, role: 'customer',
            createdAt: new Date().toISOString()
          });
        } catch(_) {}
        setMsg('rMsg', 'ok', '✓ Account created! Redirecting...');
        setTimeout(() => window.location.href = 'home.html', 900);
      })
      .catch(e => {
        setMsg('rMsg', 'err', errMsg(e.code));
        setBusy('rBtn', false, 'Create Account →');
      });
  } catch(e) {
    setMsg('rMsg', 'err', 'Firebase not configured. Please fill in firebase-config.js');
    setBusy('rBtn', false, 'Create Account →');
  }
}


/* ═══════════════════════════════════════════
   ADMIN — LOGIN
═══════════════════════════════════════════ */
function doAdmin() {
  const u = document.getElementById('a-user').value.trim();
  const p = document.getElementById('a-pass').value;
  if (!u || !p) { setMsg('aMsg', 'err', 'Please enter username and password.'); return; }
  setMsg('aMsg', 'loading', 'Verifying credentials...');
  setBusy('aBtn', true, 'Access Dashboard →');

  /* Simulate auth delay for security feel */
  setTimeout(() => {
    if (u === 'admin' && p === 'm5editz2025') {
      setMsg('aMsg', 'ok', '✓ Access granted! Loading dashboard...');
      localStorage.setItem('m5_admin', '1');
      setTimeout(() => window.location.href = 'dashboard.html', 700);
    } else {
      setMsg('aMsg', 'err', 'Invalid credentials. Access denied.');
      setBusy('aBtn', false, 'Access Dashboard →');
    }
  }, 600);
}

try {
